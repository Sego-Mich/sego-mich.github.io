# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Mich Sego
email: segomich227@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  I am a JKUAT computer technology graduate with Moringa data science and Zalego android 
  & web and design certification. I have explored Python, Java and PHP. I have also interacted 
  with python ml libraries like NumPy, Pandas, Seaborn, Matplotlib, Sklearn , TensorFlow, 
  Streamlit and Keras. With these did data cleaning, transformation, modelling and 
  deployment. I have also deployed dashboards with Tableau and  
  PowerBI. I have also created a web application with PHP, HTML, CSS and JS. I am always 
  passionate to find valuable insights and building AI integrated projects.    

#twitter_username: username
github_username: Sego-Mich
minimal_mistakes_skin: dark
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name: "Mich Sego"
  avatar: "/assets/images/profile.jpg"
  bio: "Data Science graduate with a background in Computer Technology, skilled in Python, Java, and PHP. Passionate about building AI-driven solutions and extracting insights through machine learning and data visualization tools."
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://sego-mich.github.io"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Sego-Mich"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Sego-Mich"
sass:
  style: compressed
defaults:
  # _posts 
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
